        // POST-LOAD: Dismiss spinner and hide unwanted buttons
        (function () {
            var MAX_WAIT = 15000;
            var start = Date.now();
            var dispatched = false;

            // Poll for Redux store and force-hide loading spinner
            function tryDismissSpinner() {
                if (dispatched) return;
                if (Date.now() - start > MAX_WAIT) return;

                try {
                    var rootEl = document.getElementById('root');
                    if (!rootEl) { setTimeout(tryDismissSpinner, 500); return; }

                    var store = window.__reduxStore || window.store;
                    if (store && store.dispatch) {
                        store.dispatch({ type: 'spinModel/show', payload: false });
                        store.dispatch({ type: 'phyModel/setLoading', payload: false });
                        dispatched = true;
                        return;
                    }

                    var fiber = rootEl._reactFiber || rootEl.__reactFiber || rootEl.__reactInternals;
                    if (!fiber) {
                        var key = Object.keys(rootEl).find(k => k.startsWith('__reactFiber') || k.startsWith('__reactInternalInstance'));
                        if (key) fiber = rootEl[key];
                    }

                    if (fiber) {
                        var node = fiber;
                        var maxDepth = 200;
                        var depth = 0;
                        while (node && depth < maxDepth) {
                            depth++;
                            if (node.memoizedProps && node.memoizedProps.store && node.memoizedProps.store.dispatch) {
                                var d = node.memoizedProps.store.dispatch;
                                d({ type: 'spinModel/show', payload: false });
                                d({ type: 'spinModel/updateState', payload: { show: false } });
                                dispatched = true;
                                return;
                            }
                            node = node.child || node.sibling || (node.return && node.return.sibling);
                        }
                    }
                } catch (e) { }

                setTimeout(tryDismissSpinner, 800);

                function translateNode(node) {
                    if (node.nodeType === 3) {
                        var text = node.nodeValue.trim();
                        if (text && dict[text]) {
                            node.nodeValue = node.nodeValue.replace(text, dict[text]);
                        }
                    } else if (node.nodeType === 1) {
                        if (node.tagName === 'SCRIPT' || node.tagName === 'STYLE') return;
                        if (node.placeholder && dict[node.placeholder]) node.placeholder = dict[node.placeholder];
                        if (node.title && dict[node.title]) node.title = dict[node.title];
                        for (var i = 0; i < node.childNodes.length; i++) translateNode(node.childNodes[i]);
                    }
                }

                var observer = new MutationObserver(function (mutations) {
                    mutations.forEach(function (mutation) {
                        if (mutation.addedNodes) {
                            mutation.addedNodes.forEach(function (node) { translateNode(node); });
                        }
                        if (mutation.type === 'characterData') {
                            var text = mutation.target.nodeValue.trim();
                            if (text && dict[text]) {
                                mutation.target.nodeValue = mutation.target.nodeValue.replace(text, dict[text]);
                            }
                        }
                    });
                });

                setTimeout(function () {
                    translateNode(document.body);
                    observer.observe(document.body, { childList: true, subtree: true, characterData: true });
                }, 1500);
            })();

        })();
    </script>
